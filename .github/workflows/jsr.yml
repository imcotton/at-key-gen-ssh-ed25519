name: Publish JSR

on:
  push:
    branches:
      - main

jobs:

  publish:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
        with:
          deno-version: v2

      - run: deno publish

